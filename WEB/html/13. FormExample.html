<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
  </head>
  <body>
    <form action="">
      <fieldset>
        <legend>Form</legend>
        <label for="name">Name: </label>
        <input type="text" autofocus placeholder="Enter your name..." required/><br><br>
        <label for="">Email:</label>
        <input type="email" name="" id=""><br><br>
        <label for="">Password:</label>
        <input type="password" name="" id=""><br><br>
        <label for="">Date:</label>
        <input type="date" name="" id=""><br><br>
        <label for="">Age:</label>
        <input type="number" min="1" max="25"><br><br>
        <label for="Address">Address:</label><br>
        <textarea name="" id="" rows="5" cols="30">Your address is</textarea>
        <br><br>
        <label for="gender">Gender:</label>
        <input type="radio" name="Gender" id="male"><label for="male">Male</label>
        <input type="radio" name="Gender" id="female"><label for="female">Female</label>
        <input type="radio" name="Gender" id="other"><label for="other">Other</label>
        <br><br>
        <label for="">Country: </label>
        <select name="" id="">
            <option value="" disabled>Select a country</option>
            <option value="">Pakistan</option>
            <option value="">India</option>
            <option value="">England</option>
            <option value="">USA</option>
        </select>
        <br><br>
        <label for="">Hobbies: </label>
        <input type="checkbox" name="Hobbies[]" id="">Dancing
        <input type="checkbox" name="Hobbies[]" id="">Singing
        <input type="checkbox" name="Hobbies[]" id="">Painting
        <br><br>
        <label for="">Image: </label>  
        <input type="file"><br><br>
        <label for="">Difficulty Level:</label>
        <input type="range" name="" id="" value="60"><br><br>
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">

      </fieldset>
    </form>
  </body>
</html>
