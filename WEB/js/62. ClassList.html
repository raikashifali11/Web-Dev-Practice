<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #myButton{
            padding: 10px 15px;
            font-size: 2rem;
            border: none;
        }
        .enabled{
            background-color: green;
            color: white;
        }
        .disabled{
            background-color: rgba(128, 128, 128, 0.931);
            color: rgba(255, 255, 255, 0.495);
        }
        .hover{
            background-color: rgb(0, 89, 0);
        }
    </style>
</head>
<body>
    <h1>Hello Js</h1>
    <button id="myButton">My Button</button>
    <script src="62. ClassList.js"></script>
</body>
</html>
