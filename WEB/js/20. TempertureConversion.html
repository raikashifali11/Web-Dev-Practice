<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: hsl(0, 0%, 95%);
        }
        h1{
            color: hsl(219, 97%, 50%);
        }
        form{
            background-color: white;
            text-align: center;
            max-width: 350px;
            padding: 25px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 5px 5px 15px hsla(0, 0%, 0%, 0.3);
        }
        #textBox{
            width: 50%;
            font-size: 2rem;
            text-align: center;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        label{
            font-size: 1.4em;
            font-weight: bolder;
        }
        button{
            margin-top: 15px;
            background-color: rgb(255, 46, 9);
            color: white;
            padding: 10px 20px;
            font-size: 1.5em;
            border-radius: 5px;
            border: none;
            cursor: pointer;
        }
        button:hover{
            background-color: rgb(202, 30, 0);
        }
        #result{
            font-size: 1.5em;
            font-weight: bold;
        }
    </style>
</head>
<body>
    
    <form action="">   
        <h1>Temperture Conversion:</h1>
        <input type="number" id="textBox" value="0"><br>

        <input type="radio" id="CtoF" name="unit">
        <label for="CtoF">Celcius ➡ Fahrenheit</label><br>
        <input type="radio" id="FtoC" name="unit">
        <label for="FtoC">Fahrenheit ➡ Celcius</label><br>

        <button type="button" onclick="convert();">submit</button>
        <p id="result"></p>
    </form> 
    

    <script src="20. TempertureConversion.js"></script>
</body>
</html>
