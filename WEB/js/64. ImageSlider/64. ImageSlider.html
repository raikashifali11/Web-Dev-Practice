<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider</title>
    <link rel="stylesheet" href="64. imageSlider.css">
</head>
<body>
    <div class="slider">
        <div class="slides">
            <img src="image1.png" class="slide" alt="image#1" >
            <img src="image2.png" class="slide" alt="image#2" >
            <img src="image3.png" class="slide" alt="image#3" >
        </div>
        <button class="prev" onclick="prevSlide()">&lt;</button>
        <button class="next" onclick="nextSlide()">&gt;</button>
    </div>


    <script src="64. ImageSlider.js"></script>
</body>
</html>
