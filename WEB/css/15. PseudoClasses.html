<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: blue;
            padding: 0;
            margin: 0;
        }
        ul li:last-child{
            background-color: yellow;
        }
    </style>
</head>
<body>
    <!-- Pseudo Classes
     hover
     active
     not(:hover)
     visited 
     nth-child
     first-child
     last-child
    -->

    <!-- Pseudo Elements = keyword added after a selector that's used
                      to style a specific parts of an element

                      selector::pseudo element
                      h1::first-letter
                      p::first-line
                      p::selection
                      ul li::before
                      ul li::after
    -->


    <h1>Hello CSS</h1>
    <ul>
        <li>hi</li>
        <li>hi</li>
        <li>hi</li>
        <li>hi</li>
        <li>hi</li>
        <li>hi</li>
        <li>hi</li>
        <li>hi</li>
        <li>hi</li>
    </ul>

</body>
</html>
