<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .dropdown{
            display: inline-block;
        }
        button{
            background-color: rgb(0, 120, 241);
            padding: 10px 15px;
            color: white;
            border: none;
            cursor: pointer;
        }
        .content a{
            display: block;
            color: black;
            text-decoration: none;
            padding: 8px 12px;
        }
        .dropdown .content{
            display: none;
            background-color: rgb(236, 231, 231);
            position: absolute;
            min-width: 100px;
            box-shadow: 2px 2px 5px hsla(0, 0%, 0%, 0.73);
        }
        .dropdown:hover .content{
            display: block;
        }
        .dropdown:hover button{
            background-color: rgb(11, 89, 166);
        }
        .dropdown a:hover{
            background-color: gray;
        }
    </style>
</head>
<body>
    <div class="dropdown">
        <button>Food</button>
        <div class="content">
            <a href="">Apple</a>
            <a href="">Orange</a>
            <a href="">Banana</a>
        </div>
    </div>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Iusto accusamus iste a at sequi! Tenetur quas eum voluptates repellat ad. Magni temporibus maxime nulla itaque pariatur dolorum eveniet consequuntur doloremque?</p>
</body>
</html>
