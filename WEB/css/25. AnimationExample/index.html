<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clouds Animation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h3 class="heading">Sun and Cloud Animation</h3>
    <div class="box">
        <div class="sun"></div>
        <div class="cloud1">
            <img src="clouds.png" alt="cloud" height="100%" width="100%">
        </div>
        <div class="cloud2">
            <img src="clouds.png" alt="cloud" height="100%" width="100%">
        </div>
        <div class="cloud3">
            <img src="clouds.png" alt="cloud" height="100%" width="100%">
        </div>
        <div class="cloud4">
            <img src="clouds.png" alt="cloud" height="80%" width="80%">
        </div>
        <div class="cloud5">
            <img src="clouds.png" alt="cloud" height="90%" width="90%">
        </div>
    </div>
</body>
</html>
