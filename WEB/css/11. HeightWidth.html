<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        .container{
            background-color: green;
            height: 100vh;
        }
        .box{
            background-color: lightskyblue;
            border: 2px solid;
            width: 50%;
            padding: 25px;
            float: left;
            text-align: center;
            /* min-height: 75%; */
            max-height: 75%;
        }
        
    </style>
</head>
<body>
    <div class="container">
        <div class="box">

        </div>

</html>
