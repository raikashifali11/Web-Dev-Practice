<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>image gallery</title>
    <style>
        .gallery{
            display: inline-block;
            border: 1px solid rgb(69, 68, 68);
            margin: 5px;
            width: 100px;
        }
        .description{
            text-align: center;
            padding: 5px;
            font-size: 10px;
        }
        .gallery img{
            width: 100px;
            height: 100px;
        }
    </style>
</head>
<body>
    <div class="gallery">
        <a target="_blank" href="21a.jpg">
            <img src="21a.jpg" alt="" width="100px">
        </a>
        <p class="description">Sultan Ahmad</p>
    </div>

    <div class="gallery">
        <a target="_blank" href="21b.jpg">
            <img src="21b.jpg" alt="" width="100px">
        </a>
        <p class="description">Rai Kashif Ali</p>
    </div>
    <div class="gallery">
        <a target="_blank" href="21c.jpg">
            <img src="21c.jpg" alt="" width="100px">
        </a>
        <p class="description">Rai Kashif Ali</p>
    </div>
</body>
</html>
