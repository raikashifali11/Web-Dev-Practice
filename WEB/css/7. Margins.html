<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
    }
    .box1{
        height: 150px;
        width: 150px;
        border: 5px solid;
        background-color: red;
        margin-bottom: 50px;
    }
    .box2{
        height: 150px;
        border: 5px solid;
        width: 150px;
        background-color: rgb(19, 84, 153);
    }
</style>
<body>
    <!-- margin = space around and between elements -->
     <div class="box1">Box1</div>

     <div class="box2">Box2</div>
</body>
</html>
