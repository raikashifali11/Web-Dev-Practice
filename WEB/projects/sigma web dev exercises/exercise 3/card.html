<head>

    <title>Document</title>
    <style>
        body{
            display: flex;
        }
        *{
            padding: 0;
            margin: 0;
            
        }
        .parent{
            margin: 30px 5px;
            height: 378px;
            width: 250px;
            border: 1px solid rgb(182, 178, 178);
            border-radius: 15px;

        }
        img{
            width: 240px;
            padding: 5px;
            border-radius: 15px;
        }
        .buttons{
            display: flex;
            margin-left: 15px;
            font-size: 13px;
        }
        .realbuttons{
            border: 1px solid rgb(248, 230, 207);
            color: gray;
            padding: 2px 6px 2px 6px;
            margin-right: 10px;
            border-radius: 10px; 
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;       
        }
        .heading{
            margin: 15px 10px;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 22px;
        }
        .para{
            margin: 0 10px;
            color: gray;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }
        .lbutton{
            text-align: center;
            margin-top: 14px;   
        }
        button{
            padding: 8px 15px;
            border-radius: 25px;
            font-size: 11px;
            color: rgb(49, 49, 233);
            background-color: rgb(227, 229, 231);
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        .lbutton button:hover{
            background-color: rgb(206, 218, 230);
            color: blue;
        }

    </style>
</head>
