<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
        }
        header{
            position: sticky;
            top: 0;
        }
        nav{
            height: 70px;
            background-color: pink;
           
        }
        main{
            background-color: black;
            color: white;
            padding: 30px;
        }
        .container{
            
            background-color: green;
            margin: 12px 30px;
            padding: 23px 23px;
            text-align: center;
            
        }
        .box1{
            background-color: palevioletred;
            height: 70vh;
            width: 45%;
            display: inline-block;
            margin:0 12px;
        }
        .box2{
            background-color: blue;
            height: 70vh;
            width: 45%;
            display: inline-block;
            margin:0 12px;
        }
        .text-box{
            padding: 34px;
            border: 2px solid white;
            margin: 0 34vw;

            border-radius: 13px;
        }
        .orange-box{
            height: 30px;
            width: 30px;
            background-color: orange;
            bottom: 12px;
            right: 23px;
            border-radius: 60px;
            position: fixed;
            
        }
        footer{
            height: 70px;
            background-color: white;
        }

    </style>
</head>
<body>
    <header>
        <nav>

        </nav>
    </header>
    <main>
        <div class="container">
            <div class="box1"></div>
            <div class="box2"></div>
        </div>
        <div class="text-box">
            <p>Welcome to Sigma Web Development Express</p>
        </div>
        
        <div class="orange-box">

        </div>

    </main>
    <footer>

    </footer>
    
</body>
</html>
