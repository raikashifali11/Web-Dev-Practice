<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>card</title>
    <style>
      .card {
        display: flex;
        align-items: center;
        border: 2px solid black;
        width: 1150px;
        margin: 3px;
      }
      .image img {
        width: 220px;
        padding-right: 10px;
      }
      .text h1,
      p {
        padding: 2px 0;
      }
      .image {
        position: relative;
      }
      .capsule {
        position: absolute;
        bottom: 5px;
        right: 12px;
        z-index: 10;
        color: white;
        background-color: #242020;
        opacity: 0.9;
        padding: 3px;
        font-size: 14px;
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div class="image">
          <img src="card.jpg" />
          <div class="capsule">12:50</div>
        </div>
        <div class="text">
          <h1>Introduction to Backend | Sigma Web Development - Tutorial #2</h1>
          <p>CodeWithHarry . 272K views . 2 months ago</p>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
